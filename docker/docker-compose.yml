version: "3.9"

services:
  master:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rspark:latest
    container_name: rspark-master
    command: ["master", "--api-addr", "0.0.0.0:7077", "--dashboard-addr", "0.0.0.0:8080"]
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      RSPARK_LOG: info
      RSPARK_MASTER_ID: master-1
    healthcheck:
      test: ["CMD", "/usr/local/bin/rspark-cli", "sql", "--input", "/app/examples/data/employees.csv", "SELECT COUNT(*) FROM employees"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - ../examples:/app/examples:ro
    restart: unless-stopped

  worker-1:
    image: rspark:latest
    container_name: rspark-worker-1
    depends_on:
      master:
        condition: service_started
    command: ["worker", "--master", "http://master:7077", "--bind", "0.0.0.0:9091", "--cores", "2", "--memory-mb", "1024"]
    environment:
      RSPARK_LOG: info
    restart: unless-stopped

  worker-2:
    image: rspark:latest
    container_name: rspark-worker-2
    depends_on:
      master:
        condition: service_started
    command: ["worker", "--master", "http://master:7077", "--bind", "0.0.0.0:9092", "--cores", "2", "--memory-mb", "1024"]
    environment:
      RSPARK_LOG: info
    restart: unless-stopped