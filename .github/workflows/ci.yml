name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }} / rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # Treat clippy warnings as errors to keep the bar high for new code.
      # We use `cargo clippy` (not `cargo clippy --all-targets`) so that
      # warnings in tests don't block the build, and we set `--cap-lints
      # warn` so a future Rust update that adds new lints doesn't fail
      # the build on unrelated crates.
      - name: cargo clippy (lib + bins)
        run: cargo clippy --workspace --lib --bins -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets --no-fail-fast
