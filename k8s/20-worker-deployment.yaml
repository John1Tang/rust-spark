apiVersion: apps/v1
kind: Deployment
metadata:
  name: rspark-worker
  namespace: rspark
  labels:
    app: rspark
    role: worker
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Workers are stateless and can drop traffic, so allow a brief
      # overlap so we can deploy without waiting for old workers to
      # fully drain.
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: rspark
      role: worker
  template:
    metadata:
      labels:
        app: rspark
        role: worker
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rspark
              role: worker
      terminationGracePeriodSeconds: 20
      containers:
        - name: rspark
          image: rspark:latest
          imagePullPolicy: Never
          command: ["/usr/local/bin/rspark-cli"]
          args:
            - "worker"
            - "--master"
            - "http://rspark-master:7077"
            - "--bind"
            - "0.0.0.0:9090"
            - "--cores"
            - "2"
            - "--memory-mb"
            - "1024"
          env:
            - name: RSPARK_LOG
              value: "info"
          startupProbe:
            # Worker doesn't expose an HTTP port, so use a TCP probe
            # against the (currently unused) bind address. Just check
            # the process is alive by sending SIGCONT — but exec probes
            # aren't great. Use a simple `true` since the master
            # accepts the registration as the real readiness signal.
            exec:
              command: ["/bin/true"]
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
