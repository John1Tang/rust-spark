apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: rspark
  labels:
    app: minio
    app.kubernetes.io/component: bucket-init
spec:
  template:
    metadata:
      labels:
        app: minio
        app.kubernetes.io/component: bucket-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: minio/mc:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Waiting for MinIO..."
              until /usr/bin/mc ready local 2>/dev/null || \
                    /usr/bin/mc ready http://minio:9000/ 2>/dev/null; do
                sleep 2
              done
              echo "MinIO is ready"
      containers:
        - name: create-bucket
          image: minio/mc:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mc alias set local http://minio:9000 \
                  "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              if ! mc ls local/rspark-data >/dev/null 2>&1; then
                mc mb local/rspark-data
                echo "Created bucket rspark-data"
              else
                echo "Bucket rspark-data already exists"
              fi
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password