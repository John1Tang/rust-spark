apiVersion: v1
kind: Namespace
metadata:
  name: rspark
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: rspark
type: Opaque
stringData:
  # Default MinIO root credentials. Override at install time by
  # editing the secret before the first apply, or by setting
  # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD env on the operator.
  root-user: "minio"
  root-password: "minio12345"