apiVersion: apps/v1
kind: Deployment
metadata:
  name: rspark-ingest
  namespace: rspark
  labels:
    app: rspark-ingest
    app.kubernetes.io/name: rspark-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rspark-ingest
  template:
    metadata:
      labels:
        app: rspark-ingest
        app.kubernetes.io/name: rspark-ingest
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: rspark-ingest
          image: rspark:latest
          imagePullPolicy: Never
          command: ["rspark-cli", "ingest"]
          env:
            - name: KAFKA_BROKERS
              value: "kafka.rspark.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "rspark.page_events"
            - name: RSPORT_INGEST
              value: "0.0.0.0:8081"
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5