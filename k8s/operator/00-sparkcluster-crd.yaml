apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sparkclusters.spark.rspark.io
  labels:
    app.kubernetes.io/name: rspark-operator
    app.kubernetes.io/managed-by: rspark-operator
spec:
  group: spark.rspark.io
  scope: Namespaced
  names:
    plural: sparkclusters
    singular: sparkcluster
    kind: SparkCluster
    shortNames: [rspark]
    listKind: SparkClusterList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Masters
          type: integer
          jsonPath: .status.readyMasters
        - name: Workers
          type: integer
          jsonPath: .status.readyWorkers
        - name: Endpoint
          type: string
          jsonPath: .status.masterEndpoint
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: Container image (e.g. `rspark:latest`).
                imagePullPolicy:
                  type: string
                  default: Never
                  description: Image pull policy passed to every owned container.
                master:
                  type: object
                  default: {}
                  properties:
                    replicas:
                      type: integer
                      default: 1
                    examples:
                      type: boolean
                      default: false
                    load:
                      type: array
                      items: { type: string }
                    cpu:
                      type: string
                      default: 200m
                    memory:
                      type: string
                      default: 256Mi
                workers:
                  type: object
                  default: {}
                  properties:
                    replicas:
                      type: integer
                      default: 2
                    cores:
                      type: integer
                      default: 2
                    memoryMb:
                      type: integer
                      default: 1024
                    cpu:
                      type: string
                      default: 200m
                    memory:
                      type: string
                      default: 256Mi
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Reconciling, Ready, Failed]
                masterEndpoint:
                  type: string
                readyWorkers:
                  type: integer
                readyMasters:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string }
                lastReconciledAt:
                  type: string