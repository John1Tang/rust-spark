apiVersion: v1
kind: Service
metadata:
  name: rspark-master
  namespace: rspark
  labels:
    app: rspark
    role: master
spec:
  # ClusterIP because the dashboard is exposed to the user via
  # `kubectl port-forward` (see scripts/deploy.sh). k3d's loadbalancer
  # could front this with a NodePort, but on macOS the host port mapping
  # is fragile enough that port-forward is the lower-surprise default.
  type: ClusterIP
  selector:
    app: rspark
    role: master
  ports:
    - name: api
      port: 7077
      targetPort: 7077
    - name: dashboard
      port: 8080
      targetPort: 8080
