apiVersion: v1
kind: Service
metadata:
  name: rspark-master
  namespace: rspark
  labels:
    app: rspark
    role: master
spec:
  type: ClusterIP
  selector:
    app: rspark
    role: master
  ports:
    - name: api
      port: 7077
      targetPort: 7077
    - name: dashboard
      port: 8080
      targetPort: 8080